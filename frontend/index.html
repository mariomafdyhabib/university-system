<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>AI College Scheduler Smart System</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="landing-body">
  <div class="landing-hero">
    <header class="landing-header">
      <h1>AI College Scheduler Smart System</h1>
      <p>Let the AI help you schedule your classes.</p>
    </header>
    <main class="landing-main">
      <section class="landing-cards">
        <div class="card role-card">
          <h2>Student Portal</h2>
          <p>Generate and edit Your own schedules, export to PDF and Excel.</p>
          <button onclick="window.location.href='/login-page'">Student Login</button>
          <button class="secondary" onclick="window.location.href='/register-page'">Register</button>
        </div>
        <div class="card role-card">
          <h2>Admin Portal</h2>
          <p>For Admins only to manage the system.</p>
          <button onclick="window.location.href='/admin'">Admin Dashboard</button>
        </div>
      </section>
    </main>
  </div>
</body>
</html>
