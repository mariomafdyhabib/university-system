<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Student Registration - AI College Scheduler</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="styles.css" />
</head>

<body class="auth-body">
  <div class="auth-container">
    <div class="auth-card">
      <img src="assets/logo.png" alt="IUK Logo" class="auth-logo">
      <h1>Create Account</h1>
      <p class="subtitle">International University - Kuwait</p>
      <form id="register-form">
        <div class="form-group">
          <label for="reg-name">Full Name</label>
          <input type="text" id="reg-name" name="name" placeholder="John Doe" required />
        </div>
        <div class="form-group">
          <label for="reg-email">Email Address</label>
          <input type="email" id="reg-email" name="email" placeholder="name@example.com" required />
        </div>
        <div class="form-group">
          <label for="reg-password">Password</label>
          <input type="password" id="reg-password" name="password" placeholder="••••••••" required />
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
          <div class="form-group">
            <label for="reg-major">Academic Major</label>
            <select id="reg-major" name="major_id" required>
              <option value="" disabled selected>Select Major</option>
              <option value="">Loading...</option>
            </select>
          </div>
          <div class="form-group">
            <label for="reg-year">Current Year</label>
            <input type="number" id="reg-year" name="year" placeholder="1" min="1" max="8" />
          </div>
        </div>
        <button type="submit" class="primary">Register Now</button>
        <p class="auth-switch">
          Already have an account?
          <a href="/login-page">Sign In</a>
        </p>
      </form>
      <div id="register-error" class="error-text"></div>
    </div>
  </div>
  <script src="script.js"></script>
</body>

</html>
